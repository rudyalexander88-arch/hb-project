<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Helados BON | Sistema Logístico PT</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
	
	<link rel="stylesheet" href="./css/responsive.css?v=1.0.1">
	
	<link rel="icon" type="image/jpeg" href="img/icon.png">

</head>

<body>

<!-- Fondo -->
<div class="background-pattern"></div>

<!-- Barra Superior -->
<header>

    <nav>

        <div class="logo-nav">

            <img src="img/logo.png" alt="Helados BON">

            <span>Sistema Logístico PT</span>

        </div>

        <ul>

            <li><a href="#">Inicio</a></li>

            <li><a href="#">Acerca</a></li>

            <li><a href="#">Manual</a></li>

            <li><a href="#">Contacto</a></li>

        </ul>

    </nav>

</header>

<!-- Pantalla Inicial -->

<section class="welcome-screen">

    <div id="logoContainer">

        <div class="circle-border"></div>

        <img src="img/logo.png"
             class="main-logo"
             alt="Helados BON">

    </div>

</section>

<!-- Login -->

<section class="login-section hidden" id="loginSection">

    <div class="login-card">

        <h2>Acceso al Sistema</h2>

        <p>Ingrese sus credenciales</p>

       <form id="loginForm">

    <div class="input-group">

        <i class="fa-solid fa-id-card"></i>

        <input
            type="text"
            id="usuario"
            placeholder="Usuario"
            required>

    </div>

    <div class="input-group">

        <i class="fa-solid fa-lock"></i>

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
            required>

    </div>

    <div class="remember">

        <label>

            <input type="checkbox" id="recordarme">

            Recordarme

        </label>

    </div>

    <button type="submit">

        Iniciar Sesión

    </button>

    <p id="mensaje" style="margin-top:15px;text-align:center;"></p>

</form>

        <a href="#" class="forgot">

            ¿Olvidó su contraseña?

        </a>

    </div>

</section>

<!-- Footer -->

<footer>

    © 2026 Helados BON | Sistema Logístico de Productos Terminados

</footer>

<!-- JavaScript -->

<script src="js/app.js"></script>




<script src="js/app.js"></script>

</body>
</html>
